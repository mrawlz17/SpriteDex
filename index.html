<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SpriteDex">
<meta name="theme-color" content="#090d18">
<title>SpriteDex</title>
<style>
:root{--bg:#090d18;--panel:#11182a;--panel2:#18213a;--line:#293451;--text:#f6f8fc;--muted:#a3aec5;--good:#55d98b}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#121a31 0,#090d18 30%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:10;padding:max(16px,env(safe-area-inset-top)) 16px 13px;background:rgba(9,13,24,.93);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
h1{margin:0;font-size:29px}.subtitle{margin-top:4px;color:var(--muted);font-size:13px}main{max-width:760px;margin:auto;padding:14px 14px calc(95px + env(safe-area-inset-bottom))}
.savebox{display:flex;justify-content:space-between;gap:12px;align-items:center;background:rgba(85,217,139,.08);border:1px solid rgba(85,217,139,.35);padding:11px 13px;border-radius:14px;margin-bottom:12px}
.savebox b{font-size:13px}.savebox span{font-size:11px;color:var(--muted);text-align:right}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:13px}.stat strong{display:block;font-size:23px}.stat small{color:var(--muted)}
.progress{height:10px;background:#222c44;border-radius:99px;overflow:hidden;margin:11px 0 14px}.bar{height:100%;background:linear-gradient(90deg,#6edff4,#a37dff)}
.controls{display:grid;gap:9px;margin-bottom:12px}input,select,button{font:inherit}input,select{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);padding:12px;border-radius:13px}
.filterrow{display:grid;grid-template-columns:1fr 1fr;gap:9px}.actions{display:flex;gap:8px;overflow:auto}button{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:12px;padding:10px 12px;white-space:nowrap}
button.primary{background:#234565;border-color:#4679a3}.list{display:grid;gap:10px}.sprite{background:var(--panel);border:1px solid var(--line);border-radius:17px;overflow:hidden}
.spritehead{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;border-bottom:1px solid var(--line)}.spritehead h2{margin:0;font-size:18px}.spritehead span{font-size:11px;color:var(--muted)}
.variants{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:10px}.variant{display:grid;grid-template-columns:1fr auto;align-items:center;gap:6px;background:#0d1424;border:1px solid #222d47;border-radius:13px;padding:9px}
.variant.owned{border-color:#2f885d;background:rgba(45,136,93,.12)}.vname{font-size:13px;font-weight:650}.vbuttons{display:flex;gap:5px}.mini{width:34px;height:32px;padding:0;font-size:16px;border-radius:9px}
.mini.on{background:#175e40;border-color:#3fa977}.empty{color:var(--muted);text-align:center;padding:35px}footer{position:fixed;bottom:0;left:0;right:0;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(9,13,24,.95);border-top:1px solid var(--line);font-size:11px;color:var(--muted);text-align:center}
@media(max-width:390px){.variants{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>SpriteDex</h1><div class="subtitle">Collection tracker • 91 released entries</div></header>
<main>
<div class="savebox"><b>✓ Automatic saving active</b><span id="lastSaved">No changes yet</span></div>
<section class="stats"><div class="stat"><strong id="ownedCount">0</strong><small>Owned</small></div><div class="stat"><strong id="masteredCount">0</strong><small>Mastered</small></div><div class="stat"><strong id="missingCount">91</strong><small>Missing</small></div></section>
<div class="progress"><div class="bar" id="bar"></div></div>
<section class="controls">
<input id="search" placeholder="Search sprites or variants…">
<div class="filterrow"><select id="variantFilter"></select><select id="statusFilter"><option value="">All status</option><option value="owned">Owned</option><option value="missing">Missing</option><option value="mastered">Mastered</option></select></div>
<div class="actions"><button class="primary" id="missingBtn">Show missing</button><button id="backupBtn">Export backup</button><button id="restoreBtn">Import backup</button><button id="resetBtn">Reset</button><input id="backupFile" type="file" accept="application/json" hidden></div>
</section>
<section class="list" id="list"></section>
</main>
<footer>✓ Owned &nbsp; ★ Mastered &nbsp; Saved under this exact SpriteDex web address</footer>
<script>
const groups=[{"name":"Batman","variants":[{"id":"batman-base","variant":"Base"},{"id":"batman-gold","variant":"Gold"},{"id":"batman-gummy","variant":"Gummy"},{"id":"batman-galaxy","variant":"Galaxy"},{"id":"batman-holofoil","variant":"Holofoil"},{"id":"batman-cube","variant":"Cube"}]},{"name":"Water","variants":[{"id":"water-base","variant":"Base"},{"id":"water-gold","variant":"Gold"},{"id":"water-gummy","variant":"Gummy"},{"id":"water-galaxy","variant":"Galaxy"},{"id":"water-holofoil","variant":"Holofoil"}]},{"name":"Earth","variants":[{"id":"earth-base","variant":"Base"},{"id":"earth-gold","variant":"Gold"},{"id":"earth-gummy","variant":"Gummy"},{"id":"earth-galaxy","variant":"Galaxy"},{"id":"earth-cube","variant":"Cube"}]},{"name":"Fire","variants":[{"id":"fire-base","variant":"Base"},{"id":"fire-gold","variant":"Gold"},{"id":"fire-gummy","variant":"Gummy"},{"id":"fire-galaxy","variant":"Galaxy"},{"id":"fire-holofoil","variant":"Holofoil"},{"id":"fire-cube","variant":"Cube"}]},{"name":"Duck","variants":[{"id":"duck-base","variant":"Base"},{"id":"duck-gold","variant":"Gold"},{"id":"duck-gummy","variant":"Gummy"},{"id":"duck-galaxy","variant":"Galaxy"}]},{"name":"Ghost","variants":[{"id":"ghost-base","variant":"Base"},{"id":"ghost-gold","variant":"Gold"},{"id":"ghost-gummy","variant":"Gummy"},{"id":"ghost-galaxy","variant":"Galaxy"},{"id":"ghost-holofoil","variant":"Holofoil"}]},{"name":"Dream","variants":[{"id":"dream-base","variant":"Base"},{"id":"dream-gold","variant":"Gold"},{"id":"dream-gummy","variant":"Gummy"},{"id":"dream-galaxy","variant":"Galaxy"},{"id":"dream-cube","variant":"Cube"}]},{"name":"Demon","variants":[{"id":"demon-base","variant":"Base"},{"id":"demon-gold","variant":"Gold"},{"id":"demon-gummy","variant":"Gummy"},{"id":"demon-galaxy","variant":"Galaxy"}]},{"name":"Punk","variants":[{"id":"punk-base","variant":"Base"},{"id":"punk-gold","variant":"Gold"},{"id":"punk-gummy","variant":"Gummy"},{"id":"punk-galaxy","variant":"Galaxy"},{"id":"punk-cube","variant":"Cube"}]},{"name":"King","variants":[{"id":"king-base","variant":"Base"},{"id":"king-gold","variant":"Gold"},{"id":"king-gummy","variant":"Gummy"},{"id":"king-galaxy","variant":"Galaxy"},{"id":"king-holofoil","variant":"Holofoil"}]},{"name":"Burnt Peanut","variants":[{"id":"burnt-peanut-base","variant":"Base"}]},{"name":"Vini Jr.","variants":[{"id":"vini-jr-base","variant":"Base"}]},{"name":"Zero Point","variants":[{"id":"zero-point-base","variant":"Base"},{"id":"zero-point-gold","variant":"Gold"},{"id":"zero-point-gummy","variant":"Gummy"},{"id":"zero-point-galaxy","variant":"Galaxy"}]},{"name":"Fishy","variants":[{"id":"fishy-base","variant":"Base"},{"id":"fishy-gold","variant":"Gold"},{"id":"fishy-gummy","variant":"Gummy"},{"id":"fishy-galaxy","variant":"Galaxy"},{"id":"fishy-cube","variant":"Cube"}]},{"name":"Striker","variants":[{"id":"striker-base","variant":"Base"},{"id":"striker-gold","variant":"Gold"},{"id":"striker-gummy","variant":"Gummy"},{"id":"striker-galaxy","variant":"Galaxy"},{"id":"striker-holofoil","variant":"Holofoil"}]},{"name":"Aura","variants":[{"id":"aura-base","variant":"Base"},{"id":"aura-gold","variant":"Gold"},{"id":"aura-gummy","variant":"Gummy"},{"id":"aura-galaxy","variant":"Galaxy"}]},{"name":"Boss","variants":[{"id":"boss-base","variant":"Base"},{"id":"boss-gold","variant":"Gold"},{"id":"boss-gummy","variant":"Gummy"},{"id":"boss-galaxy","variant":"Galaxy"},{"id":"boss-cube","variant":"Cube"}]},{"name":"Grim","variants":[{"id":"grim-base","variant":"Base"},{"id":"grim-gold","variant":"Gold"},{"id":"grim-gummy","variant":"Gummy"},{"id":"grim-galaxy","variant":"Galaxy"},{"id":"grim-cube","variant":"Cube"}]},{"name":"Air","variants":[{"id":"air-base","variant":"Base"},{"id":"air-gold","variant":"Gold"},{"id":"air-gummy","variant":"Gummy"},{"id":"air-galaxy","variant":"Galaxy"},{"id":"air-holofoil","variant":"Holofoil"}]},{"name":"Seven","variants":[{"id":"seven-base","variant":"Base"},{"id":"seven-gold","variant":"Gold"},{"id":"seven-gummy","variant":"Gummy"},{"id":"seven-galaxy","variant":"Galaxy"},{"id":"seven-holofoil","variant":"Holofoil"}]},{"name":"Pollo","variants":[{"id":"pollo-base","variant":"Base"}]}];
const ALL=groups.flatMap(g=>g.variants.map(v=>({...v,name:g.name})));
const KEY="spritedex-v1", META="spritedex-meta-v1";
let state=JSON.parse(localStorage.getItem(KEY)||"{}"), meta=JSON.parse(localStorage.getItem(META)||"{}");
const $=id=>document.getElementById(id);
const variantNames=[...new Set(ALL.map(x=>x.variant))];
$("variantFilter").innerHTML='<option value="">All variants</option>'+variantNames.map(v=>`<option>${v}</option>`).join("");
function showSaved(){$("lastSaved").textContent=meta.lastSaved?"Last saved "+new Date(meta.lastSaved).toLocaleString([],{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}):"No changes yet";}
function save(){localStorage.setItem(KEY,JSON.stringify(state));meta.lastSaved=new Date().toISOString();localStorage.setItem(META,JSON.stringify(meta));showSaved();}
window.toggle=(id,key)=>{state[id]=state[id]||{};state[id][key]=!state[id][key];if(key==="mastered"&&state[id][key])state[id].owned=true;if(key==="owned"&&!state[id][key])state[id].mastered=false;save();render();};
function render(){
 const q=$("search").value.toLowerCase().trim(), vf=$("variantFilter").value, sf=$("statusFilter").value;
 const visible=groups.map(g=>({name:g.name,variants:g.variants.filter(v=>{const s=state[v.id]||{},text=(g.name+" "+v.variant).toLowerCase();return(!q||text.includes(q))&&(!vf||v.variant===vf)&&(!sf||(sf==="owned"&&s.owned)||(sf==="missing"&&!s.owned)||(sf==="mastered"&&s.mastered));})})).filter(g=>g.variants.length);
 $("list").innerHTML=visible.length?visible.map(g=>`<article class="sprite"><div class="spritehead"><h2>${g.name}</h2><span>${g.variants.filter(v=>state[v.id]?.owned).length} / ${g.variants.length} shown owned</span></div><div class="variants">${g.variants.map(v=>{const s=state[v.id]||{};return`<div class="variant ${s.owned?"owned":""}"><div class="vname">${v.variant}</div><div class="vbuttons"><button class="mini ${s.owned?"on":""}" onclick="toggle('${v.id}','owned')">✓</button><button class="mini ${s.mastered?"on":""}" onclick="toggle('${v.id}','mastered')">★</button></div></div>`;}).join("")}</div></article>`).join(""):'<div class="empty">No entries match those filters.</div>';
 const owned=ALL.filter(x=>state[x.id]?.owned).length, mastered=ALL.filter(x=>state[x.id]?.mastered).length;
 $("ownedCount").textContent=owned;$("masteredCount").textContent=mastered;$("missingCount").textContent=ALL.length-owned;$("bar").style.width=(owned/ALL.length*100).toFixed(1)+"%";
}
["search","variantFilter","statusFilter"].forEach(id=>$(id).addEventListener(id==="search"?"input":"change",render));
$("missingBtn").onclick=()=>{$("statusFilter").value="missing";render();};
$("backupBtn").onclick=()=>{const payload={version:2,exportedAt:new Date().toISOString(),state,meta},blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="SpriteDex-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);};
$("restoreBtn").onclick=()=>$("backupFile").click();
$("backupFile").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);state=d.state||d;meta=d.meta||{lastSaved:new Date().toISOString()};localStorage.setItem(KEY,JSON.stringify(state));localStorage.setItem(META,JSON.stringify(meta));showSaved();render();alert("SpriteDex backup restored.");}catch{alert("That is not a valid SpriteDex backup.");}};r.readAsText(f);};
$("resetBtn").onclick=()=>{if(confirm("Erase all SpriteDex progress on this device?")){state={};meta={};localStorage.removeItem(KEY);localStorage.removeItem(META);showSaved();render();}};
showSaved();render();
</script>
</body></html>
